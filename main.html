<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Page</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px;
            overflow: hidden;
        }

        .question-header {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            max-width: 800px;
            margin-top: 20px;
            letter-spacing: -0.5px;
            line-height: 1.3;
        }

        .button-container {
            display: flex;
            gap: 24px;
            align-items: center;
            justify-content: center;
            margin-top: auto;
            margin-bottom: auto; 
        }

        .btn {
            padding: 16px 40px;
            font-size: 1.25rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            min-width: 140px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-yes {
            background-color: #34d399; /* Smooth Emerald Green */
            color: #064e3b;
            box-shadow: 0 4px 14px rgba(52, 211, 153, 0.3);
        }

        .btn-yes:hover {
            background-color: #10b981;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 211, 153, 0.4);
        }

        .btn-no {
            background-color: #f87171; /* Smooth Pastel Red */
            color: #7f1d1d;
            box-shadow: 0 4px 14px rgba(248, 113, 113, 0.3);
        }

        .btn-no:hover {
            background-color: #ef4444;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(248, 113, 113, 0.4);
        }

        .btn:active {
            transform: translateY(1px);
        }

        @media (max-width: 600px) {
            .question-header {
                font-size: 1.75rem;
            }
            .button-container {
                flex-direction: column;
                gap: 16px;
                width: 100%;
                max-width: 300px;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <h1 class="question-header">Is ZephyrrFlamess a gay furry , femboy, etc..?</h1>

    <div class="button-container">
        <button class="btn btn-yes" id="yesBtn">Yes</button>
        <button class="btn btn-no" id="noBtn">No</button>
    </div>

    <!-- Empty spacer to keep buttons perfectly centered -->
    <div style="height: 40px; visibility: hidden;"></div>

    <script>
        const yesButton = document.getElementById('yesBtn');
        const noButton = document.getElementById('noBtn');

        // Logic for clicking "Yes"
        yesButton.addEventListener('click', () => {
            alert("sometimes you're too curious");
            // Redirects to the official Rick Roll YouTube video
            window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        });

        // Logic for clicking "No"
        noButton.addEventListener('click', () => {
            // Opens a new blank tab
            const newTab = window.open('about:blank', '_blank');
            
            if (newTab) {
                // Injects HTML and CSS directly into the new tab to center "right answer👍"
                newTab.document.write(`
                    <!DOCTYPE html>
                    <html lang="en">
                    <head>
                        <title>Right Answer</title>
                        <style>
                            body {
                                background-color: #121214;
                                color: #ffffff;
                                font-family: 'Segoe UI', sans-serif;
                                height: 100vh;
                                display: flex;
                                justify-content: center;
                                align-items: center;
                                margin: 0;
                            }
                            h1 {
                                font-size: 4rem;
                                text-align: center;
                            }
                        </style>
                    </head>
                    <body>
                        <h1>right answer👍</h1>
                    </body>
                    </html>
                `);
                newTab.document.close();
            } else {
                // Fallback if the browser blocks the popup tab
                alert("Popup blocked! Please allow popups for this site to see the result.");
            }
        });
    </script>

</body>
</html>
